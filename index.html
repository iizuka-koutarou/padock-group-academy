<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADOCK GROUP ACADEMY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Yu Gothic",sans-serif;
background:#0d0d0d;
color:white;
}

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("hero.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

padding:20px;

}

.hero-content{
max-width:1000px;
}

.logo{

width:500px;
max-width:90%;

margin-bottom:40px;

}

.hero h1{

font-size:72px;
line-height:1.2;

margin-bottom:30px;

}

.catch{

font-size:32px;
margin-bottom:40px;
font-weight:300;

}

.philosophy{

font-size:24px;
line-height:2;

margin-bottom:50px;

}

.button{

display:inline-block;

padding:25px 80px;

font-size:24px;

background:white;
color:black;

text-decoration:none;

border-radius:10px;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#d40000;
color:white;

}

.menu{

padding:100px 30px;

max-width:1400px;

margin:auto;

}

.menu-title{

text-align:center;

font-size:48px;

margin-bottom:50px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}

.card{

background:#1b1b1b;

padding:40px;

border-radius:15px;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

background:#252525;

}

.card h3{

font-size:28px;

margin-bottom:15px;

}

.card p{

font-size:18px;

color:#ccc;

}

footer{

text-align:center;

padding:50px;

color:#888;

}

@media(max-width:768px){

.hero h1{
font-size:42px;
}

.catch{
font-size:22px;
}

.philosophy{
font-size:18px;
}

.button{

padding:20px 50px;

font-size:20px;

}

.logo{

width:300px;

}

}

</style>

</head>

</div>
