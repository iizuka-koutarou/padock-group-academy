<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PADOCK GROUP ACADEMY</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:"Yu Gothic",sans-serif;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),
    url("hero.jpg");
    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content{
    max-width:800px;
    padding:20px;
}

.logo{
    width:250px;
    margin-bottom:30px;
}

h1{
    font-size:4rem;
    margin-bottom:20px;
}

.tagline{
    font-size:1.5rem;
    color:#dddddd;
}

.philosophy{
    margin-top:40px;
    line-height:2;
}

.button{
    display:inline-block;
    margin-top:40px;
    padding:15px 40px;
    border:1px solid white;
    color:white;
    text-decoration:none;
}

.menu{
    padding:80px 20px;
    max-width:1200px;
    margin:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1a1a1a;
    padding:30px;
    border-radius:12px;
}

.card h3{
    margin-top:0;
}
</style>

</head>

<body>

<section class="hero">

<div class="hero-content">

<img src="ロゴ.png" class="logo">

<h1>PADOCK GROUP<br>ACADEMY</h1>

<p class="tagline">
人を育て、感動を創る。
</p>

<div class="philosophy">

<h2>四方良し</h2>

<p>
お客様と地域に愛され、<br>
全社員の幸せを恒久的に実現する
</p>

</div>

<a href="#menu" class="button">
学習を始める
</a>

</div>

</section>

<section class="menu" id="menu">

<div class="grid">

<div class="card">
<h3>経営理念</h3>
<p>理念と行動指針を学ぶ</p>
</div>

<div class="card">
<h3>電話対応</h3>
<p>電話応対の基礎を学ぶ</p>
</div>

<div class="card">
<h3>コンシェルジュ</h3>
<p>接客と商談を学ぶ</p>
</div>

<div class="card">
<h3>テクニシャン</h3>
<p>整備品質と安全を学ぶ</p>
</div>

<div class="card">
<h3>車両知識</h3>
<p>車種や特徴を学ぶ</p>
</div>

<div class="card">
<h3>FAQ</h3>
<p>よくある質問を見る</p>
</div>

</div>

</section>

</body>
</html>
