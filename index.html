<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADOCK GROUP ACADEMY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(0,0,0,.60),
rgba(0,0,0,.75)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;

color:white;

}

.card{

background:
rgba(10,15,25,.85);

backdrop-filter:blur(10px);

padding:60px;

border-radius:25px;

width:100%;
max-width:500px;

text-align:center;

box-shadow:
0 15px 40px rgba(0,0,0,.3);

}

h1{

font-size:40px;

letter-spacing:3px;

margin-bottom:20px;

}

.subtitle{

color:#cccccc;

line-height:1.8;

margin-bottom:35px;

}

input{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:12px;

background:#1d1d1d;

color:white;

font-size:16px;

}

input:focus{

outline:none;

border:1px solid #1F3A5F;

}

button{

width:100%;

padding:18px;

margin-top:25px;

border:none;

border-radius:12px;

background:#1F3A5F;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

opacity:.95;

}

.error{

margin-top:20px;

color:#ff8080;

}

.footer{

margin-top:30px;

font-size:12px;

color:#888;

letter-spacing:2px;

}

@media(max-width:768px){

.card{

padding:40px 25px;

}

h1{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="card">

<h1>PADOCK GROUP ACADEMY</h1>

<p class="subtitle">

Learn. Challenge. Grow.

<br><br>

学び、成長し、<br>
お客様へ価値を届ける。

</p>

<input
id="id"
type="text"
placeholder="ID">

<input
id="pass"
type="password"
placeholder="パスワード">

<button onclick="login()">
LOGIN
</button>

<div
id="error"
class="error">
</div>

<div class="footer">

PADOCK GROUP

</div>

</div>

<script>

const LOGIN_ID = "academy";
const LOGIN_PASS = "paddock2026";

function login(){

const id =
document.getElementById("id").value;

const pass =
document.getElementById("pass").value;

if(
id === LOGIN_ID &&
pass === LOGIN_PASS
){

location.href = "welcome.html";

}else{

document.getElementById("error").innerText =
"IDまたはパスワードが違います";

}

}

</script>

</body>
</html>
