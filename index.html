<!DOCTYPE html>

<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADOCK GROUP ACADEMY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:#050505;
color:white;
}

.hidden{
display:none;
}

.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{

background:#111;

padding:60px;

border-radius:20px;

width:100%;
max-width:500px;

text-align:center;

}

.logo{
width:220px;
margin-bottom:30px;
}

h1{
margin-bottom:20px;
}

input{

width:100%;

padding:18px;

margin-top:15px;

background:#1c1c1c;

border:none;

color:white;

font-size:16px;

}

button{

margin-top:20px;

padding:18px 40px;

background:white;

border:none;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#d9d9d9;

}

.error{

color:red;

margin-top:20px;

}

.hero-image{

height:35vh;

background:
linear-gradient(
rgba(0,0,0,.3),
rgba(0,0,0,.6)
),
url("hero.jpg");

background-size:cover;
background-position:center;

}

.hero{

padding:80px 20px;

text-align:center;

}

.hero h1{

font-size:70px;

letter-spacing:8px;

}

.hero h2{

font-size:50px;

font-weight:300;

letter-spacing:10px;

margin-bottom:30px;

}

.brand-select{

max-width:1000px;

margin:auto;

padding:50px 20px;

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

.brand-card{

background:#111;

padding:60px;

text-align:center;

cursor:pointer;

transition:.3s;

border:1px solid #222;

}

.brand-card:hover{

transform:translateY(-5px);

border-color:white;

}

.menu{

max-width:900px;

margin:auto;

padding:50px 20px;

}

.menu a{

display:block;

padding:30px 0;

border-bottom:1px solid rgba(255,255,255,.1);

text-decoration:none;

color:white;

}

.menu h3{

font-size:32px;

}

.menu p{

color:#999;

margin-top:5px;

}

.back{

display:inline-block;

margin:20px;

color:white;

text-decoration:none;

}

@media(max-width:768px){

.brand-select{

grid-template-columns:1fr;

}

.hero h1{
font-size:40px;
}

.hero h2{
font-size:30px;
}

}

</style>

</head>

<body>

<div id="loginPage" class="center">

<div class="card">

<img src="ロゴ.png" class="logo">

<h1>PADOCK GROUP ACADEMY</h1>

<p>ログインしてください</p>

<input id="id" placeholder="ID">

<input id="pass" type="password" placeholder="パスワード">

<button onclick="login()">
LOGIN
</button>

<div id="error" class="error"></div>

</div>

</div>

<div id="brandPage" class="hidden">

<div class="hero-image"></div>

<div class="hero">

<h1>PADOCK GROUP</h1>

<h2>ACADEMY</h2>

<p>ブランドを選択してください</p>

</div>

<div class="brand-select">

<div class="brand-card" onclick="showMenu('KAWASAKI')">

<h2>KAWASAKI</h2>

<p>カワサキプラザ研修</p>

</div>

<div class="brand-card" onclick="showMenu('DUCATI')">

<h2>DUCATI</h2>

<p>ドゥカティ研修</p>

</div>

</div>

</div>

<div id="menuPage" class="hidden">

<a href="#" class="back" onclick="backToBrands()">
← ブランド選択へ戻る
</a>

<div class="hero">

<h1 id="brandTitle">KAWASAKI</h1>

</div>

<div class="menu">

<a href="philosophy.html">
<h3>PHILOSOPHY</h3>
<p>経営理念</p>
</a>

<a href="#">
<h3>PHONE SKILL</h3>
<p>電話対応</p>
</a>

<a href="#">
<h3>CONCIERGE</h3>
<p>コンシェルジュ</p>
</a>

<a href="#">
<h3>TECHNICIAN</h3>
<p>テクニシャン</p>
</a>

<a href="#">
<h3>PRODUCT KNOWLEDGE</h3>
<p>車両知識</p>
</a>

<a href="#">
<h3>FAQ</h3>
<p>よくある質問</p>
</a>

</div>

</div>

<script>

const LOGIN_ID = "academy";
const LOGIN_PASS = "paddock2026";

function login(){

let id = document.getElementById("id").value;
let pass = document.getElementById("pass").value;

if(id === LOGIN_ID && pass === LOGIN_PASS){

document.getElementById("loginPage").style.display="none";
document.getElementById("brandPage").classList.remove("hidden");

}else{

document.getElementById("error").innerText="IDまたはパスワードが違います";

}

}

function showMenu(brand){

document.getElementById("brandPage").classList.add("hidden");

document.getElementById("menuPage").classList.remove("hidden");

document.getElementById("brandTitle").innerText = brand;

}

function backToBrands(){

document.getElementById("menuPage").classList.add("hidden");

document.getElementById("brandPage").classList.remove("hidden");

}

</script>

</body>

</html>
