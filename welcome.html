<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADOCK GROUP ACADEMY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;

}

.container{

text-align:center;

max-width:900px;

margin:auto;

padding:100px 30px 50px;

}

.logo{

font-size:18px;

letter-spacing:8px;

color:rgba(255,255,255,.75);

font-weight:bold;

margin-bottom:20px;

}

h1{

font-size:70px;

font-weight:700;

line-height:1.2;

margin-bottom:30px;

}

.catch{

font-size:22px;

line-height:2;

color:#dddddd;

margin-bottom:50px;

}

.start-btn{

display:inline-block;

padding:18px 60px;

background:#244A78;

color:white;

text-decoration:none;

font-weight:bold;

letter-spacing:3px;

border-radius:50px;

transition:.3s;

margin-bottom:80px;

}

.start-btn:hover{

transform:translateY(-5px);

opacity:.95;

}

.academy-title{

font-size:32px;

margin-bottom:30px;

color:white;

text-shadow:
0 2px 10px rgba(0,0,0,.4);

}

.academy-grid{

max-width:1100px;

margin:auto;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:25px;

padding-bottom:80px;

}

.academy-card{

background:rgba(255,255,255,.96);

padding:30px;

border-radius:20px;

text-decoration:none;

color:#222;

transition:.3s;

box-shadow:
0 5px 20px rgba(0,0,0,.15);

}

  .academy-card:hover{

transform:translateY(-5px);

box-shadow:
0 10px 30px rgba(0,0,0,.25);

}

.academy-card h3{

color:#244A78;

margin-bottom:15px;

font-size:24px;

}

.academy-card p{

line-height:1.8;

color:#666;

}

@media(max-width:768px){

h1{
font-size:42px;
}

.catch{
font-size:18px;
}

.academy-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
PADOCK GROUP
</div>

<h1>
ACADEMY
</h1>

<div class="catch">

学び、成長し、<br>
お客様へ価値を届ける。

</div>

<a href="first-day.html" class="start-btn">
START
</a>

<h2 class="academy-title">
ACADEMY MENU
</h2>

<div class="academy-grid">

<a href="first-day.html" class="academy-card">

<h3>入社初日</h3>

<p>
パドックグループの考え方を学ぶ
</p>

</a>

<a href="philosophy.html" class="academy-card">

<h3>経営理念</h3>

<p>
四方良しと理念経営を理解する
</p>

</a>

<a href="philosophy-test.html" class="academy-card">

<h3>理解度テスト</h3>

<p>
フィロソフィーの理解を確認する
</p>

</a>

<a href="next-stage.html" class="academy-card">

<h3>ブランド選択</h3>

<p>
Kawasaki・Ducati Academyへ進む
</p>

</a>

<a href="phone.html" class="academy-card">

<h3>電話対応</h3>

<p>
お客様対応の基本を学ぶ
</p>

</a>

<a href="complaint.html" class="academy-card">

<h3>クレーム対応</h3>

<p>
誠意ある対応を学ぶ
</p>

</a>

</div>

</div>

</body>
</html>
