<!DOCTYPE html>
<html lang="ja">
<head>

<title>PADOCK GROUP ACADEMY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;

body{

overflow:hidden;
background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("hero.jpg");

background-size:cover;
background-position:center;
