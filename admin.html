<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academy 管理者ページ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.60),
rgba(0,0,0,.80)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:80px 30px;
}

.hero{
text-align:center;
margin-bottom:50px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
}

.employee-card{

background:
rgba(255,255,255,.95);

color:#222;

padding:30px;

border-radius:20px;

margin-bottom:25px;

box-shadow:
0 5px 20px rgba(0,0,0,.2);

}

.employee-name{

font-size:28px;

font-weight:bold;

color:#1F3A5F;

margin-bottom:15px;

}

.login-date{

margin-bottom:20px;

color:#666;

}

.test-row{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px solid #eee;

}

.back{

display:block;

text-align:center;

margin-top:40px;

color:white;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>👨‍💼 管理者ページ</h1>

<p>

社員の学習状況を確認

</p>

</div>

<div id="employee-list">

</div>

<a href="welcome.html" class="back">

← Academy TOPへ戻る

</a>

</div>

<script>

const employees = [

{
id:"iizuka_k",
name:"飯塚康太郎"
},

{
id:"iizuka_s",
name:"飯塚宗一郎"
},

{
id:"aoshima",
name:"青島昇平"
}

];

const area =
document.getElementById("employee-list");

employees.forEach(emp=>{

const card =
document.createElement("div");

card.className =
"employee-card";

card.innerHTML =

`

<div class="employee-name">

${emp.name}

</div>

<div class="login-date">

最終ログイン：

${localStorage.getItem(emp.id + "_lastlogin") || "未ログイン"}

</div>

<div class="test-row">
<span>共通教育試験</span>
<span>${localStorage.getItem(emp.id + "_common") === "pass" ? "✅" : "❌"}</span>
</div>

<div class="test-row">
<span>Kawasaki基礎試験</span>
<span>${localStorage.getItem(emp.id + "_basic") === "pass" ? "✅" : "❌"}</span>
</div>

<div class="test-row">
<span>Kawasakiコンシェルジュ試験</span>
<span>${localStorage.getItem(emp.id + "_concierge") === "pass" ? "✅" : "❌"}</span>
</div>

<div class="test-row">
<span>Kawasakiテクニシャン試験</span>
<span>${localStorage.getItem(emp.id + "_technician") === "pass" ? "✅" : "❌"}</span>
</div>

`;

area.appendChild(card);

});

</script>

</body>
</html>
