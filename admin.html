<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADOCK GROUP ACADEMY 管理者ページ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.60),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:80px 30px;
}

.hero{
text-align:center;
margin-bottom:50px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
}

.employee-card{

background:
rgba(255,255,255,.96);

color:#222;

padding:30px;

border-radius:20px;

margin-bottom:25px;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}

.employee-name{

font-size:28px;

font-weight:bold;

color:#1F3A5F;

margin-bottom:10px;

}

.login-date{

color:#666;

margin-bottom:20px;

}

.test-row{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px solid #eee;

}

.test-row:last-child{
border-bottom:none;
}

.back-btn{

display:inline-block;

margin-top:30px;

padding:15px 30px;

background:#1F3A5F;

color:white;

text-decoration:none;

border-radius:10px;

}

.center{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>👨‍💼 管理者ページ</h1>

<p>
社員の学習状況を確認
</p>

</div>

<div id="employee-list">

</div>

<div class="center">

<a href="welcome.html"
class="back-btn">

🏠 Academy TOPへ戻る

</a>

</div>

</div>

<script>

const employees = [

{
id:"iizuka_k",
name:"飯塚康太郎"
},

{
id:"iizuka_s",
name:"飯塚宗一郎"
},

{
id:"aoshima",
name:"青島昇平"
}

];

const area =
document.getElementById(
"employee-list"
);

employees.forEach(emp=>{

const card =
document.createElement("div");

card.className =
"employee-card";

const common =
localStorage.getItem(
emp.id + "_common"
) === "pass"
? "✅"
: "❌";

const basic =
localStorage.getItem(
emp.id + "_basic"
) === "pass"
? "✅"
: "❌";

const concierge =
localStorage.getItem(
emp.id + "_concierge"
) === "pass"
? "✅"
: "❌";

const technician =
localStorage.getItem(
emp.id + "_technician"
) === "pass"
? "✅"
: "❌";

const sales =
localStorage.getItem(
emp.id + "_ducati_sales"
) === "pass"
? "✅"
: "❌";

const service =
localStorage.getItem(
emp.id + "_ducati_service"
) === "pass"
? "✅"
: "❌";

const lastLogin =
localStorage.getItem(
emp.id + "_lastlogin"
) || "未ログイン";

card.innerHTML =

`

<div class="employee-name">

${emp.name}

</div>

<div class="login-date">

最終ログイン：
${lastLogin}

</div>

<div class="test-row">
<span>共通教育試験</span>
<span>${common}</span>
</div>

<div class="test-row">
<span>Kawasaki基礎試験</span>
<span>${basic}</span>
</div>

<div class="test-row">
<span>Kawasakiコンシェルジュ試験</span>
<span>${concierge}</span>
</div>

<div class="test-row">
<span>Kawasakiテクニシャン試験</span>
<span>${technician}</span>
</div>

<div class="test-row">
<span>Ducatiセールス試験</span>
<span>${sales}</span>
</div>

<div class="test-row">
<span>Ducatiサービス試験</span>
<span>${service}</span>
</div>

`;

area.appendChild(card);

});

</script>

</body>
</html>
```
