<!-- technician-test.html -->

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawasakiテクニシャン試験</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:60px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:8px 0;
cursor:pointer;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.back{
display:block;
text-align:center;
margin-top:30px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Kawasakiテクニシャン試験</h1>

<div class="subtitle">

10問中8問以上で合格

</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 点検の目的は？</div>
<label><input type="radio" name="q1" value="1"> 事故を未然に防ぐこと</label>
<label><input type="radio" name="q1" value="0"> 作業時間を増やすこと</label>
<label><input type="radio" name="q1" value="0"> 部品販売を増やすこと</label>
</div>

<div class="card">
<div class="question">Q2. 故障診断で最初に行うことは？</div>
<label><input type="radio" name="q2" value="1"> 症状確認</label>
<label><input type="radio" name="q2" value="0"> 部品交換</label>
<label><input type="radio" name="q2" value="0"> 見積作成</label>
</div>

<div class="card">
<div class="question">Q3. 症状と原因は？</div>
<label><input type="radio" name="q3" value="1"> 別物である</label>
<label><input type="radio" name="q3" value="0"> 同じである</label>
<label><input type="radio" name="q3" value="0"> 関係ない</label>
</div>

<div class="card">
<div class="question">Q4. テクニシャンに必要な姿勢は？</div>
<label><input type="radio" name="q4" value="1"> 学び続けること</label>
<label><input type="radio" name="q4" value="0"> 経験だけに頼ること</label>
<label><input type="radio" name="q4" value="0"> 勘で判断すること</label>
</div>

<div class="card">
<div class="question">Q5. 車検の本来の目的は？</div>
<label><input type="radio" name="q5" value="1"> 安全確認</label>
<label><input type="radio" name="q5" value="0"> 書類更新</label>
<label><input type="radio" name="q5" value="0"> 売上向上</label>
</div>

<div class="card">
<div class="question">Q6. 現象再現はなぜ重要？</div>
<label><input type="radio" name="q6" value="1"> 正しい診断のため</label>
<label><input type="radio" name="q6" value="0"> 作業短縮のため</label>
<label><input type="radio" name="q6" value="0"> 関係ない</label>
</div>

<div class="card">
<div class="question">Q7. 診断で大切なのは？</div>
<label><input type="radio" name="q7" value="1"> 事実確認</label>
<label><input type="radio" name="q7" value="0"> 推測</label>
<label><input type="radio" name="q7" value="0"> 思い込み</label>
</div>

<div class="card">
<div class="question">Q8. お客様への説明で大切なことは？</div>
<label><input type="radio" name="q8" value="1"> 分かりやすい説明</label>
<label><input type="radio" name="q8" value="0"> 専門用語だけで話す</label>
<label><input type="radio" name="q8" value="0"> 説明しない</label>
</div>

<div class="card">
<div class="question">Q9. パドックが求めるテクニシャン像は？</div>
<label><input type="radio" name="q9" value="1"> 安全を最優先する</label>
<label><input type="radio" name="q9" value="0"> 作業速度だけを重視する</label>
<label><input type="radio" name="q9" value="0"> 売上だけを重視する</label>
</div>

<div class="card">
<div class="question">Q10. 技術は何になる？</div>
<label><input type="radio" name="q10" value="1"> 信頼になる</label>
<label><input type="radio" name="q10" value="0"> 自慢になる</label>
<label><input type="radio" name="q10" value="0"> 関係ない</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<a href="technician.html" class="back">
← テクニシャンコースへ戻る
</a>

</div>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(ans){
score += Number(ans.value);
}

}

const result =
document.getElementById("result");

if(score >= 8){

const user =
localStorage.getItem("currentUser");

if(user){

localStorage.setItem(
user + "_technician",
"pass"
);

}

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"テクニシャンコースを修了しました。" +

"<br><br>" +

"安全を守るプロフェッショナルとして認定されました。" +

"<br><br>" +

'<a href="welcome.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;">🏠 Academy TOPへ戻る</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}
