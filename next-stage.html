<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXT STAGE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
max-width:1200px;
width:100%;
text-align:center;
}

h1{
font-size:60px;
margin-bottom:20px;
}

.sub{
font-size:22px;
color:#aaa;
margin-bottom:60px;
}

.cards{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
}

.card{
width:450px;
background:#111;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:30px;
}

.card h2{
font-size:32px;
margin-bottom:15px;
}

.card p{
color:#ccc;
line-height:1.8;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 35px;
border-radius:10px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:white;
}

.kawasaki{
background:#6DB33F;
}

.ducati{
background:#d40000;
}

.home{
margin-top:60px;
display:inline-block;
color:#aaa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>NEXT STAGE</h1>

<p class="sub">

ブランドの理解を深めましょう

</p>

<div class="cards">

<div class="card">

<img src="kawasaki-top.jpg">

<div class="card-content">

<h2>Kawasaki Academy</h2>

<p>

カワサキの歴史・思想・魅力を学び、
お客様へ伝えられるスタッフを目指します。

</p>

<a href="kawasaki.html" class="btn kawasaki">

Kawasakiへ進む

</a>

</div>

</div>

<div class="card">

<img src="ducati-top.jpg">

<div class="card-content">

<h2>Ducati Academy</h2>

<p>

ドゥカティブランドの世界観と
情熱を学びます。

</p>

<a href="ducati.html" class="btn ducati">

Ducatiへ進む

</a>

</div>

</div>

</div>

<br>

<a href="welcome.html" class="home">

🏠 HOMEへ戻る

</a>

</div>

</body>
</html>
