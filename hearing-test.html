<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来店目的ヒアリング理解度チェック</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:55px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:10px 0;
cursor:pointer;
font-size:18px;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.navigation{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.navigation a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>来店目的ヒアリング理解度チェック</h1>

<div class="subtitle">
10問中8問以上で合格
</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 来店目的ヒアリングとは何ですか？</div>
<label><input type="radio" name="q1" value="1"> お客様を理解するための接客</label>
<label><input type="radio" name="q1" value="0"> 車両説明をすること</label>
<label><input type="radio" name="q1" value="0"> 契約を取ること</label>
</div>

<div class="card">
<div class="question">Q2. 最初に確認することは？</div>
<label><input type="radio" name="q2" value="1"> 初来店かどうか</label>
<label><input type="radio" name="q2" value="0"> 予算だけ</label>
<label><input type="radio" name="q2" value="0"> 年齢だけ</label>
</div>

<div class="card">
<div class="question">Q3. 初来店のお客様へのお声掛けは？</div>
<label><input type="radio" name="q3" value="1"> 気になる車両等がありましたら何なりとお申し付けください</label>
<label><input type="radio" name="q3" value="0"> すぐ見積を作りましょう</label>
<label><input type="radio" name="q3" value="0"> 何を買いますか？</label>
</div>

<div class="card">
<div class="question">Q4. お声掛け後に重要なことは？</div>
<label><input type="radio" name="q4" value="1"> 一度離れる判断をする</label>
<label><input type="radio" name="q4" value="0"> ずっと話し続ける</label>
<label><input type="radio" name="q4" value="0"> 商談を始める</label>
</div>

<div class="card">
<div class="question">Q5. 再度お声掛けする目安は？</div>
<label><input type="radio" name="q5" value="1"> 2〜3分後</label>
<label><input type="radio" name="q5" value="0"> 30秒後</label>
<label><input type="radio" name="q5" value="0"> 10分後</label>
</div>

<div class="card">
<div class="question">Q6. 再度お声掛けするタイミングは？</div>
<label><input type="radio" name="q6" value="1"> 同じ車両を長く見ている時</label>
<label><input type="radio" name="q6" value="0"> 店舗に入った瞬間</label>
<label><input type="radio" name="q6" value="0"> 帰る時だけ</label>
</div>

<div class="card">
<div class="question">Q7. ヒアリングの目的は？</div>
<label><input type="radio" name="q7" value="1"> お客様を理解すること</label>
<label><input type="radio" name="q7" value="0"> 契約を取ること</label>
<label><input type="radio" name="q7" value="0"> 車両説明だけすること</label>
</div>

<div class="card">
<div class="question">Q8. お客様によって何が違いますか？</div>
<label><input type="radio" name="q8" value="1"> 求める距離感</label>
<label><input type="radio" name="q8" value="0"> 挨拶の必要性</label>
<label><input type="radio" name="q8" value="0"> 接客の必要性</label>
</div>

<div class="card">
<div class="question">Q9. パドックが大切にしていることは？</div>
<label><input type="radio" name="q9" value="1"> 一度離れることも接客の一つ</label>
<label><input type="radio" name="q9" value="0"> 常に話し続ける</label>
<label><input type="radio" name="q9" value="0"> 常に商談する</label>
</div>

<div class="card">
<div class="question">Q10. 接客とは何ですか？</div>
<label><input type="radio" name="q10" value="1"> お客様を理解すること</label>
<label><input type="radio" name="q10" value="0"> 商品を説明すること</label>
<label><input type="radio" name="q10" value="0"> 売ること</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<div class="navigation">

<a href="hearing.html">
← 来店目的ヒアリングへ戻る
</a>

<a href="concierge-skill.html">
📚 コンシェルジュスキル一覧
</a>

<a href="welcome.html">
🏠 Academy TOP
</a>

</div>

</div>

<script src="academy.js"></script>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q"+i+""]:checked'
);

if(ans){
score += Number(ans.value);
}

}

const result =
document.getElementById("result");

if(score >= 8){

completeCourse("hearing");

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"来店目的ヒアリングコースを修了しました。" +

"<br><br>" +

'<a href="questionnaire.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;font-size:20px;font-weight:bold;">▶ 次へ進む（来店アンケート）</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}

}

</script>

</body>
</html>
