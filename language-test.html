<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言葉遣い理解度チェック</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:55px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:
0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:10px 0;
cursor:pointer;
font-size:18px;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.navigation{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.navigation a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>言葉遣い理解度チェック</h1>

<div class="subtitle">
10問中8問以上で合格
</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 言葉遣いの目的は？</div>
<label><input type="radio" name="q1" value="1"> お客様に安心していただくため</label>
<label><input type="radio" name="q1" value="0"> 自分を良く見せるため</label>
<label><input type="radio" name="q1" value="0"> ルールだから</label>
</div>

<div class="card">
<div class="question">Q2. 感謝を伝える時に大切なことは？</div>
<label><input type="radio" name="q2" value="1"> 言葉で伝える</label>
<label><input type="radio" name="q2" value="0"> 心で思うだけで良い</label>
<label><input type="radio" name="q2" value="0"> 特に必要ない</label>
</div>

<div class="card">
<div class="question">Q3. パドックで大切にしている言葉は？</div>
<label><input type="radio" name="q3" value="1"> ありがとうございます</label>
<label><input type="radio" name="q3" value="0"> ありがとうございましただけ</label>
<label><input type="radio" name="q3" value="0"> お疲れ様です</label>
</div>

<div class="card">
<div class="question">Q4. お客様のお名前を呼ぶ理由は？</div>
<label><input type="radio" name="q4" value="1"> 信頼関係を築くため</label>
<label><input type="radio" name="q4" value="0"> 呼ばなくても良い</label>
<label><input type="radio" name="q4" value="0"> マニュアルだから</label>
</div>

<div class="card">
<div class="question">Q5. 専門用語はどうする？</div>
<label><input type="radio" name="q5" value="1"> お客様に伝わるよう説明する</label>
<label><input type="radio" name="q5" value="0"> とにかく使う</label>
<label><input type="radio" name="q5" value="0"> 説明しない</label>
</div>

<div class="card">
<div class="question">Q6. 敬語はなぜ必要？</div>
<label><input type="radio" name="q6" value="1"> 相手への敬意を表すため</label>
<label><input type="radio" name="q6" value="0"> 決まりだから</label>
<label><input type="radio" name="q6" value="0"> 使わなくても良い</label>
</div>

<div class="card">
<div class="question">Q7. 否定から入るのは？</div>
<label><input type="radio" name="q7" value="0"> 良い</label>
<label><input type="radio" name="q7" value="1"> 良くない</label>
<label><input type="radio" name="q7" value="0"> どちらでも良い</label>
</div>

<div class="card">
<div class="question">Q8. 「〜です」「〜ます」は？</div>
<label><input type="radio" name="q8" value="1"> 丁寧な印象を与える</label>
<label><input type="radio" name="q8" value="0"> 古い言い方</label>
<label><input type="radio" name="q8" value="0"> 必要ない</label>
</div>

<div class="card">
<div class="question">Q9. 言葉は何を表す？</div>
<label><input type="radio" name="q9" value="1"> 会社の品格</label>
<label><input type="radio" name="q9" value="0"> 個人の趣味</label>
<label><input type="radio" name="q9" value="0"> 関係ない</label>
</div>

<div class="card">
<div class="question">Q10. お客様は何を覚えている？</div>
<label><input type="radio" name="q10" value="1"> どのように言われたか</label>
<label><input type="radio" name="q10" value="0"> 値段だけ</label>
<label><input type="radio" name="q10" value="0"> 商品名だけ</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<div class="navigation">

<a href="language.html">
← 言葉遣いへ戻る
</a>

<a href="concierge-skill.html">
📚 コンシェルジュスキル一覧
</a>

<a href="welcome.html">
🏠 Academy TOP
</a>

</div>

</div>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(ans){

score += Number(ans.value);

}

}

const result =
document.getElementById("result");

if(score >= 8){

const user =
localStorage.getItem("currentUser");

if(user){

localStorage.setItem(
user + "_language",
"pass"
);

}

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"言葉遣いコースを修了しました。" +

"<br><br>" +

'<a href="speaking.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;font-size:20px;font-weight:bold;">▶ 次へ進む（話し方）</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}

}

</script>

</body>
</html>
