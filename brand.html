<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ブランド選択</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

.hero{

padding:80px 30px 50px;

text-align:center;

}

.hero h1{

font-size:60px;

margin-bottom:20px;

}

.hero p{

font-size:20px;

color:#666;

}

.cards{

max-width:1300px;

margin:auto;

padding:40px 30px 100px;

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

}

.card{

border-radius:30px;

padding:60px;

min-height:500px;

cursor:pointer;

transition:.3s;

display:flex;

flex-direction:column;

justify-content:space-between;

}

.card:hover{

transform:translateY(-10px);

}

.kawasaki{

background:white;

border:3px solid #6DB33F;

}

.ducati{

background:#111;

color:white;

border:3px solid #d40000;

}

.number{

font-size:18px;

opacity:.6;

}

.card h2{

font-size:60px;

margin-top:20px;

}

.card p{

font-size:22px;

line-height:1.8;

margin-top:20px;

}

.enter{

margin-top:40px;

display:inline-block;

padding:18px 40px;

border-radius:50px;

font-weight:bold;

font-size:18px;

}

.kawasaki .enter{

background:#6DB33F;

color:white;

}

.ducati .enter{

background:#d40000;

color:white;

}

@media(max-width:900px){

.cards{

grid-template-columns:1fr;

}

.hero h1{

font-size:40px;

}

.card h2{

font-size:42px;

}

}

</style>

</head>

<body>

<section class="hero">

<h1>PADOCK GROUP ACADEMY</h1>

<p>

学ぶブランドを選択してください

</p>

</section>

<div class="cards">

<div
class="card kawasaki"
onclick="location.href='kawasaki.html'">

<div>

<div class="number">
01
</div>

<h2>KAWASAKI</h2>

<p>

Ride the Good Times

</p>

</div>

<div class="enter">
ENTER
</div>

</div>

<div
class="card ducati"
onclick="location.href='ducati.html'">

<div>

<div class="number">
02
</div>

<h2>DUCATI</h2>

<p>

Style. Sophistication.
Performance.

</p>

</div>

<div class="enter">
ENTER
</div>

</div>

</div>

</body>
</html>
