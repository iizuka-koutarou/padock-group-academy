<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来店客把握理解度チェック</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:55px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:10px 0;
cursor:pointer;
font-size:18px;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.navigation{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.navigation a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>来店客把握理解度チェック</h1>

<div class="subtitle">
10問中8問以上で合格
</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 来店客把握とは何ですか？</div>
<label><input type="radio" name="q1" value="1"> 来店前から準備を行うこと</label>
<label><input type="radio" name="q1" value="0"> 来店後に考えること</label>
<label><input type="radio" name="q1" value="0"> 商談すること</label>
</div>

<div class="card">
<div class="question">Q2. 最初に確認するものは？</div>
<label><input type="radio" name="q2" value="1"> タイムツリー</label>
<label><input type="radio" name="q2" value="0"> SNS</label>
<label><input type="radio" name="q2" value="0"> ニュース</label>
</div>

<div class="card">
<div class="question">Q3. 来店前に確認する内容は？</div>
<label><input type="radio" name="q3" value="1"> お名前・来店目的</label>
<label><input type="radio" name="q3" value="0"> 趣味だけ</label>
<label><input type="radio" name="q3" value="0"> 年齢だけ</label>
</div>

<div class="card">
<div class="question">Q4. お客様のお名前を確認する理由は？</div>
<label><input type="radio" name="q4" value="1"> ご来店時にお名前でお迎えするため</label>
<label><input type="radio" name="q4" value="0"> 特に理由はない</label>
<label><input type="radio" name="q4" value="0"> 社内管理のためだけ</label>
</div>

<div class="card">
<div class="question">Q5. 来店目的を確認する理由は？</div>
<label><input type="radio" name="q5" value="1"> スムーズにご案内するため</label>
<label><input type="radio" name="q5" value="0"> 時間を潰すため</label>
<label><input type="radio" name="q5" value="0"> 特に必要ない</label>
</div>

<div class="card">
<div class="question">Q6. 担当者確認の目的は？</div>
<label><input type="radio" name="q6" value="1"> スムーズに引き継ぐため</label>
<label><input type="radio" name="q6" value="0"> 確認しなくて良い</label>
<label><input type="radio" name="q6" value="0"> 店長だけが知れば良い</label>
</div>

<div class="card">
<div class="question">Q7. ご来店時に大切なことは？</div>
<label><input type="radio" name="q7" value="1"> お名前を呼んでご挨拶する</label>
<label><input type="radio" name="q7" value="0"> 無言で案内する</label>
<label><input type="radio" name="q7" value="0"> 担当に任せる</label>
</div>

<div class="card">
<div class="question">Q8. 来店客把握で得られるものは？</div>
<label><input type="radio" name="q8" value="1"> お客様の安心感</label>
<label><input type="radio" name="q8" value="0"> 売上だけ</label>
<label><input type="radio" name="q8" value="0"> 特に何もない</label>
</div>

<div class="card">
<div class="question">Q9. パドックが大切にしている考え方は？</div>
<label><input type="radio" name="q9" value="1"> 来店前から接客は始まっている</label>
<label><input type="radio" name="q9" value="0"> 来店後から接客する</label>
<label><input type="radio" name="q9" value="0"> 商談から接客する</label>
</div>

<div class="card">
<div class="question">Q10. お客様が探しているものは？</div>
<label><input type="radio" name="q10" value="1"> 自分を大切にしてくれるお店</label>
<label><input type="radio" name="q10" value="0"> バイクだけ</label>
<label><input type="radio" name="q10" value="0"> 値引きだけ</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<div class="navigation">

<a href="customer-check.html">
← 来店客把握へ戻る
</a>

<a href="concierge-skill.html">
📚 コンシェルジュスキル一覧
</a>

<a href="welcome.html">
🏠 Academy TOP
</a>

</div>

</div>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q"+i+""]:checked'
);

if(ans){
score += Number(ans.value);
}

}

const result =
document.getElementById("result");

if(score >= 8){

const user =
localStorage.getItem("currentUser");

if(user){

localStorage.setItem(
user + "_customer_check",
"pass"
);

}

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"来店客把握コースを修了しました。" +

"<br><br>" +

'<a href="hearing.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;font-size:20px;font-weight:bold;">▶ 次へ進む（来店目的ヒアリング）</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}

}

</script>

</body>
</html>
