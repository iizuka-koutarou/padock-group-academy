<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来店アンケート理解度チェック</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:55px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:10px 0;
cursor:pointer;
font-size:18px;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.navigation{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.navigation a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>来店アンケート理解度チェック</h1>

<div class="subtitle">
10問中8問以上で合格
</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 来店アンケートの目的は？</div>
<label><input type="radio" name="q1" value="1"> お客様サポートの準備</label>
<label><input type="radio" name="q1" value="0"> 個人情報収集</label>
<label><input type="radio" name="q1" value="0"> 営業管理のみ</label>
</div>

<div class="card">
<div class="question">Q2. 来店アンケートは何で入力する？</div>
<label><input type="radio" name="q2" value="1"> QRコードからお客様のスマートフォンで入力</label>
<label><input type="radio" name="q2" value="0"> 紙に記入</label>
<label><input type="radio" name="q2" value="0"> スタッフが代わりに入力</label>
</div>

<div class="card">
<div class="question">Q3. 入力時間の目安は？</div>
<label><input type="radio" name="q3" value="1"> 約3分</label>
<label><input type="radio" name="q3" value="0"> 約30秒</label>
<label><input type="radio" name="q3" value="0"> 約10分</label>
</div>

<div class="card">
<div class="question">Q4. 見積作成時に来店アンケートは？</div>
<label><input type="radio" name="q4" value="1"> 必須</label>
<label><input type="radio" name="q4" value="0"> 不要</label>
<label><input type="radio" name="q4" value="0"> 希望者のみ</label>
</div>

<div class="card">
<div class="question">Q5. 車両確保時にも必要？</div>
<label><input type="radio" name="q5" value="1"> 必要</label>
<label><input type="radio" name="q5" value="0"> 不要</label>
<label><input type="radio" name="q5" value="0"> 場合による</label>
</div>

<div class="card">
<div class="question">Q6. 後日LINEで見積を送る場合も必要？</div>
<label><input type="radio" name="q6" value="1"> 必要</label>
<label><input type="radio" name="q6" value="0"> 不要</label>
<label><input type="radio" name="q6" value="0"> 関係ない</label>
</div>

<div class="card">
<div class="question">Q7. 入力中に分からないことがあった場合は？</div>
<label><input type="radio" name="q7" value="1"> 何でもお声掛けくださいとご案内する</label>
<label><input type="radio" name="q7" value="0"> 自分で調べてもらう</label>
<label><input type="radio" name="q7" value="0"> そのまま進めてもらう</label>
</div>

<div class="card">
<div class="question">Q8. 入力後に行うことは？</div>
<label><input type="radio" name="q8" value="1"> 入力完了を確認する</label>
<label><input type="radio" name="q8" value="0"> 特に何もしない</label>
<label><input type="radio" name="q8" value="0"> お客様任せ</label>
</div>

<div class="card">
<div class="question">Q9. アンケート内容は何に繋がる？</div>
<label><input type="radio" name="q9" value="1"> CRM登録</label>
<label><input type="radio" name="q9" value="0"> 在庫管理</label>
<label><input type="radio" name="q9" value="0"> 経理処理</label>
</div>

<div class="card">
<div class="question">Q10. パドックの考え方は？</div>
<label><input type="radio" name="q10" value="1"> お客様をサポートするための準備</label>
<label><input type="radio" name="q10" value="0"> 情報収集が目的</label>
<label><input type="radio" name="q10" value="0"> 契約のためだけ</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<div class="navigation">

<a href="questionnaire.html">
← 来店アンケートへ戻る
</a>

<a href="concierge-skill.html">
📚 コンシェルジュスキル一覧
</a>

<a href="welcome.html">
🏠 Academy TOP
</a>

</div>

</div>

<script src="academy.js"></script>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q"+i+""]:checked'
);

if(ans){
score += Number(ans.value);
}

}

const result =
document.getElementById("result");

if(score >= 8){

completeCourse("questionnaire");

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"来店アンケートコースを修了しました。" +

"<br><br>" +

'<a href="welcome-drink.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;font-size:20px;font-weight:bold;">▶ 次へ進む（ウェルカムドリンク）</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}

}

</script>

</body>
</html>
