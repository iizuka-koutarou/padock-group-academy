<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>査定理解度チェック</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:55px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:10px 0;
cursor:pointer;
font-size:18px;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
background:#0B8F3C;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:40px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.navigation{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.navigation a{
color:white;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>査定理解度チェック</h1>

<div class="subtitle">
10問中8問以上で合格
</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. 査定とは何ですか？</div>
<label><input type="radio" name="q1" value="1"> お客様の車両を正しく評価すること</label>
<label><input type="radio" name="q1" value="0"> 金額だけ決めること</label>
<label><input type="radio" name="q1" value="0"> 買取契約だけ行うこと</label>
</div>

<div class="card">
<div class="question">Q2. 査定前にお願いするものは？</div>
<label><input type="radio" name="q2" value="1"> 査定お伺いシート</label>
<label><input type="radio" name="q2" value="0"> ローン申込書</label>
<label><input type="radio" name="q2" value="0"> 任意保険申込書</label>
</div>

<div class="card">
<div class="question">Q3. 査定時に確認する内容は？</div>
<label><input type="radio" name="q3" value="1"> 転倒歴や傷の有無</label>
<label><input type="radio" name="q3" value="0"> 好きな食べ物</label>
<label><input type="radio" name="q3" value="0"> 通勤時間</label>
</div>

<div class="card">
<div class="question">Q4. 査定額に大きく影響する場合があるものは？</div>
<label><input type="radio" name="q4" value="1"> 純正パーツの有無</label>
<label><input type="radio" name="q4" value="0"> ヘルメットの色</label>
<label><input type="radio" name="q4" value="0"> ガソリン残量</label>
</div>

<div class="card">
<div class="question">Q5. 査定フローの最初に行うことは？</div>
<label><input type="radio" name="q5" value="1"> 写真撮影</label>
<label><input type="radio" name="q5" value="0"> 契約書作成</label>
<label><input type="radio" name="q5" value="0"> 納車説明</label>
</div>

<div class="card">
<div class="question">Q6. 写真撮影で重要なものは？</div>
<label><input type="radio" name="q6" value="1"> 傷や凹み箇所</label>
<label><input type="radio" name="q6" value="0"> スタッフ写真</label>
<label><input type="radio" name="q6" value="0"> 店舗写真のみ</label>
</div>

<div class="card">
<div class="question">Q7. 業者へ送る情報は？</div>
<label><input type="radio" name="q7" value="1"> 年式・走行距離・転倒歴</label>
<label><input type="radio" name="q7" value="0"> お客様の趣味</label>
<label><input type="radio" name="q7" value="0"> 購入希望車種</label>
</div>

<div class="card">
<div class="question">Q8. パドックが目指す査定方法は？</div>
<label><input type="radio" name="q8" value="1"> できる限り自店販売を目指す</label>
<label><input type="radio" name="q8" value="0"> 必ず業者販売する</label>
<label><input type="radio" name="q8" value="0"> 査定しない</label>
</div>

<div class="card">
<div class="question">Q9. 査定額は何を確認して決めますか？</div>
<label><input type="radio" name="q9" value="1"> 業者査定と中古車相場</label>
<label><input type="radio" name="q9" value="0"> 業者査定だけ</label>
<label><input type="radio" name="q9" value="0"> 感覚だけ</label>
</div>

<div class="card">
<div class="question">Q10. パドックが大切にしている査定とは？</div>
<label><input type="radio" name="q10" value="1"> お客様に納得いただくこと</label>
<label><input type="radio" name="q10" value="0"> 安く買うこと</label>
<label><input type="radio" name="q10" value="0"> 高く買うこと</label>
</div>

<button type="button" onclick="checkTest()">
試験結果を見る
</button>

</form>

<div id="result"></div>

<div class="navigation">

<a href="assessment.html">
← 査定へ戻る
</a>

<a href="concierge-skill.html">
📚 コンシェルジュスキル一覧
</a>

<a href="welcome.html">
🏠 Academy TOP
</a>

</div>

</div>

<script src="academy.js"></script>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

const ans =
document.querySelector(
'input[name="q"+i+""]:checked'
);

if(ans){
score += Number(ans.value);
}

}

const result =
document.getElementById("result");

if(score >= 8){

completeCourse("assessment");

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"査定コースを修了しました。" +

"<br><br>" +

'<a href="contract.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;font-size:20px;font-weight:bold;">▶ 次へ進む（契約）</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10" +

"<br><br>" +

"もう一度学習内容を確認しましょう。";

}

}

</script>

</body>
</html>
