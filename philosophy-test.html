<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHILOSOPHY TEST</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:#050505;
color:white;
padding:60px 20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:60px;
margin-bottom:20px;
text-align:center;
}

.sub{
text-align:center;
color:#999;
margin-bottom:60px;
}

.question{
background:#111;
padding:30px;
border-radius:20px;
margin-bottom:25px;
}

.question h2{
font-size:22px;
margin-bottom:20px;
}

label{
display:block;
padding:12px 0;
cursor:pointer;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:20px;
font-size:20px;
font-weight:bold;
border:none;
background:#6DB33F;
color:white;
cursor:pointer;
border-radius:12px;
margin-top:40px;
}

button:hover{
opacity:.9;
}

.result{
margin-top:40px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.pass{
color:#6DB33F;
}

.fail{
color:#ff6666;
}

</style>

</head>

<body>

<div class="container">

<h1>PHILOSOPHY TEST</h1>

<p class="sub">
合格ライン：10問中8問以上
</p>

<form id="quizForm">

<div class="question">
<h2>Q1. 担当者が不在。お客様から問い合わせが来た。</h2>
<label><input type="radio" name="q1" value="1">調べて対応する</label>
<label><input type="radio" name="q1" value="0">明日まで待ってもらう</label>
</div>

<div class="question">
<h2>Q2. 目標達成が厳しい時は？</h2>
<label><input type="radio" name="q2" value="1">達成方法を考える</label>
<label><input type="radio" name="q2" value="0">諦める</label>
</div>

<div class="question">
<h2>Q3. 新しい仕事を任された。</h2>
<label><input type="radio" name="q3" value="1">挑戦する</label>
<label><input type="radio" name="q3" value="0">断る</label>
</div>

<div class="question">
<h2>Q4. 約束時間に遅れそう。</h2>
<label><input type="radio" name="q4" value="1">事前連絡する</label>
<label><input type="radio" name="q4" value="0">黙って向かう</label>
</div>

<div class="question">
<h2>Q5. 分からない質問を受けた。</h2>
<label><input type="radio" name="q5" value="1">調べて回答する</label>
<label><input type="radio" name="q5" value="0">適当に答える</label>
</div>

<div class="question">
<h2>Q6. 改善点を見つけた。</h2>
<label><input type="radio" name="q6" value="1">提案する</label>
<label><input type="radio" name="q6" value="0">放置する</label>
</div>

<div class="question">
<h2>Q7. 担当外のお客様が困っている。</h2>
<label><input type="radio" name="q7" value="1">助ける</label>
<label><input type="radio" name="q7" value="0">関係ない</label>
</div>

<div class="question">
<h2>Q8. 目標未達成だった。</h2>
<label><input type="radio" name="q8" value="1">原因分析する</label>
<label><input type="radio" name="q8" value="0">言い訳する</label>
</div>

<div class="question">
<h2>Q9. 学ぶ理由は？</h2>
<label><input type="radio" name="q9" value="1">お客様へ価値提供するため</label>
<label><input type="radio" name="q9" value="0">怒られないため</label>
</div>

<div class="question">
<h2>Q10. 最も大切なのは？</h2>
<label><input type="radio" name="q10" value="1">フィロソフィーの実践</label>
<label><input type="radio" name="q10" value="0">現状維持</label>
</div>

<button type="button" onclick="checkQuiz()">
採点する
</button>

</form>

<div id="result" class="result"></div>

</div>

<script>

function checkQuiz(){

let score = 0;

for(let i=1;i<=10;i++){

let answer =
document.querySelector(`input[name="q${i}"]:checked`);

if(answer){

score += Number(answer.value);

}

}

let result =
document.getElementById("result");

if(score >= 8){

result.innerHTML =
`<div class="pass">
合格！ ${score}/10<br><br>
Kawasaki Academyへ進めます。
<br><br>
<a href="next-stage.html">
style="color:white;">
▶ Kawasakiへ進む
</a>
</div>`;

}else{

result.innerHTML =
`<div class="fail">
不合格 ${score}/10
<br><br>
もう一度フィロソフィーを読み返しましょう。
</div>`;

}

}

</script>

</body>
</html>
