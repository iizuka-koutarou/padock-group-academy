<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),url('paddock-top.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}
.container{max-width:1100px;margin:auto;padding:80px 30px;}
.hero{text-align:center;margin-bottom:60px;}
.hero h1{font-size:64px;margin-bottom:20px;}
.hero p{font-size:22px;color:#ddd;line-height:1.8;}

.card{
background:rgba(255,255,255,.96);
color:#222;
padding:35px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.card h2{

margin-bottom:15px;
}

.skill-box{
padding:20px 0;
border-bottom:1px solid #ddd;
}

.skill-box:last-child{
border-bottom:none;
}

.skill-box h3{
color:#1F3A5F;
margin-bottom:10px;
font-size:24px;
}

.skill-box p{
line-height:1.8;
color:#666;
}

.quote{
background:rgba(0,0,0,.65);
padding:40px;
border-radius:20px;
text-align:center;
font-size:26px;
font-weight:bold;
margin:30px 0;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:30px;
}

.menu-card{
background:rgba(255,255,255,.96);
padding:30px;
border-radius:20px;
text-decoration:none;
color:#222;
transition:.3s;
}

.menu-card:hover{
transform:translateY(-5px);
border-bottom:5px solid #1F3A5F;
}

.menu-card h3{
color:#1F3A5F;
margin-bottom:10px;
}

.btn-area{
text-align:center;
margin-top:40px;
}

.back{
display:inline-block;
margin-top:20px;
color:white;
text-decoration:none;
}

@media(max-width:768px){
.hero h1{font-size:42px;}
.hero p{font-size:18px;}
}
</style>
</head>
