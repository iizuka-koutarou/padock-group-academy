<!DOCTYPE html>
<html lang="ja">
<head>

<title>共通教育 | PADOCK GROUP ACADEMY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Yu Gothic",sans-serif;}
body{
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),url('paddock-top.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}
.container{max-width:1100px;margin:auto;padding:80px 30px;}
.hero{text-align:center;margin-bottom:60px;}
.hero h1{font-size:64px;margin-bottom:20px;}
.hero p{font-size:22px;color:#ddd;line-height:1.8;}
.card{
background:rgba(255,255,255,.96);
color:#222;
padding:35px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}
.card h2{color:#1F3A5F;margin-bottom:15px;}
.step{
padding:20px 0;
border-bottom:1px solid #ddd;
}
.step:last-child{border-bottom:none;}
.step h3{color:#1F3A5F;margin-bottom:8px;}
.flow{
text-align:center;
font-size:24px;
font-weight:bold;
line-height:2.2;
}
.quote{
background:rgba(0,0,0,.65);
padding:40px;
border-radius:20px;
text-align:center;
font-size:26px;
font-weight:bold;
margin:30px 0;
}
.btn-area{text-align:center;margin-top:40px;}
.btn{
display:inline-block;
padding:20px 60px;
background:#1F3A5F;
color:white;
text-decoration:none;
border-radius:50px;
font-size:22px;
font-weight:bold;
}
.back{
display:inline-block;
margin-top:25px;
color:white;
text-decoration:none;
}
@media(max-width:768px){
.hero h1{font-size:42px;}
.hero p{font-size:18px;}
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<h1>共通教育</h1>
<p>
パドックグループで働く上で<br>
最初に学ぶべき内容です。
</p>
</div>

<div class="card">

<p>
会社の考え方、お客様との向き合い方、働く姿勢を学びます。
すべての学びの土台となる教育です。
</p>
</div>

四方良し<br>

共通教育試験

</div>

知識の前に考え方。<br>
すべての学びの土台となる共通教育。
