<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawasakiコンシェルジュ認定試験</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),
url("paddock-top.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 25px;
}

h1{
text-align:center;
font-size:60px;
color:#6CFF6C;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:22px;
color:#ddd;
margin-bottom:50px;
}

.card{
background:white;
color:#222;
padding:30px;
border-radius:20px;
margin-bottom:20px;
box-shadow:
0 5px 20px rgba(0,0,0,.15);
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0B8F3C;
}

label{
display:block;
padding:8px 0;
cursor:pointer;
}

button{

width:100%;

padding:20px;

border:none;

border-radius:15px;

background:#0B8F3C;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

margin-top:20px;

}

#result{

margin-top:40px;

text-align:center;

font-size:30px;

font-weight:bold;

}

.back{

display:block;

text-align:center;

margin-top:30px;

color:white;

text-decoration:none;

}

</style>
</head>

<body>

<div class="container">

<h1>Kawasakiコンシェルジュ認定試験</h1>

<div class="subtitle">

10問中8問以上で合格

</div>

<form id="quiz">

<div class="card">
<div class="question">Q1. ヒアリングの目的は？</div>
<label><input type="radio" name="q1" value="0"> 車両を売ること</label>
<label><input type="radio" name="q1" value="1"> お客様を理解すること</label>
<label><input type="radio" name="q1" value="0"> 見積りを作ること</label>
</div>

<div class="card">
<div class="question">Q2. 商談で最も大切なことは？</div>
<label><input type="radio" name="q2" value="0"> 値引き</label>
<label><input type="radio" name="q2" value="1"> 最適な選択をしていただく</label>
<label><input type="radio" name="q2" value="0"> 契約を急がせる</label>
</div>

<div class="card">
<div class="question">Q3. コンシェルジュの役割は？</div>
<label><input type="radio" name="q3" value="1"> バイクライフの提案</label>
<label><input type="radio" name="q3" value="0"> 販売のみ</label>
<label><input type="radio" name="q3" value="0"> 車検受付のみ</label>
</div>

<div class="card">
<div class="question">Q4. 納車とは？</div>
<label><input type="radio" name="q4" value="0"> ゴール</label>
<label><input type="radio" name="q4" value="1"> スタート</label>
<label><input type="radio" name="q4" value="0"> 引渡し作業</label>
</div>

<div class="card">
<div class="question">Q5. アフターフォローの目的は？</div>
<label><input type="radio" name="q5" value="0"> 次の販売だけ</label>
<label><input type="radio" name="q5" value="1"> 信頼関係の継続</label>
<label><input type="radio" name="q5" value="0"> 点検案内だけ</label>
</div>

<div class="card">
<div class="question">Q6. FAQ対応で大切なことは？</div>
<label><input type="radio" name="q6" value="0"> すぐ答える</label>
<label><input type="radio" name="q6" value="1"> 不安を解消する</label>
<label><input type="radio" name="q6" value="0"> カタログを見せる</label>
</div>

<div class="card">
<div class="question">Q7. お客様の話はどうする？</div>
<label><input type="radio" name="q7" value="1"> 最後まで聞く</label>
<label><input type="radio" name="q7" value="0"> 途中で提案する</label>
<label><input type="radio" name="q7" value="0"> スペック説明を優先する</label>
</div>

<div class="card">
<div class="question">Q8. 納車時に大切なことは？</div>
<label><input type="radio" name="q8" value="1"> 納車体験を提供する</label>
<label><input type="radio" name="q8" value="0"> 書類だけ渡す</label>
<label><input type="radio" name="q8" value="0"> 写真は不要</label>
</div>

<div class="card">
<div class="question">Q9. パドックが目指す姿は？</div>
<label><input type="radio" name="q9" value="1"> バイクライフの提供</label>
<label><input type="radio" name="q9" value="0"> 販売台数No.1</label>
<label><input type="radio" name="q9" value="0"> 値引きNo.1</label>
</div>

<div class="card">
<div class="question">Q10. 信頼は何から生まれる？</div>
<label><input type="radio" name="q10" value="0"> 値引き</label>
<label><input type="radio" name="q10" value="1"> 小さな約束の積み重ね</label>
<label><input type="radio" name="q10" value="0"> 広告</label>
</div>

<button type="button" onclick="checkTest()">

試験結果を見る

</button>

</form>

<div id="result"></div>

<a href="concierge.html" class="back">

← コンシェルジュコースへ戻る

</a>

</div>

<script>

function checkTest(){

let score = 0;

for(let i=1;i<=10;i++){

let ans =
document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(ans){

score += Number(ans.value);

}

}

const result =
document.getElementById("result");

if(score >= 8){

const user =
localStorage.getItem("currentUser");

if(user){

localStorage.setItem(
user + "_concierge",
"pass"
);

}

result.innerHTML =

"✅ 合格！<br>" +

score +

" / 10" +

"<br><br>" +

"コンシェルジュコースを修了しました。" +

"<br><br>" +

'<a href="welcome.html" style="display:inline-block;padding:15px 30px;background:#0B8F3C;color:white;text-decoration:none;border-radius:10px;">🏠 Academy TOPへ戻る</a>';

}else{

result.innerHTML =

"❌ 不合格<br>" +

score +

" / 10";

}

}

</script>

</body>

</html>
